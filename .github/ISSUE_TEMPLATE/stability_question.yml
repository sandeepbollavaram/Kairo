name: Stability / contract question
description: Question about a stable surface, deprecation, or schema.
title: 'stability: '
labels: ['question', 'stability']
body:
  - type: markdown
    attributes:
      value: |
        Use this for questions about what is `stable` vs `experimental`,
        how to evolve a surface, or whether a change is back-compat. See
        `docs/API_STABILITY.md` for the policy.

  - type: input
    id: surface
    attributes:
      label: Surface in question
      description: A MCP tool name, inspect route, schema constant, snapshot field, or CLI command.
      placeholder: kairo_session_start
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
    validations:
      required: true

  - type: input
    id: tier
    attributes:
      label: 'Optional: current tier'
      description: Output of `kairo stability <surface>` if you've checked.
      placeholder: stable [since 0.1.0, mcp-tool]
