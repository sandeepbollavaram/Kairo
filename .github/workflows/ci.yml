name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Read-only by default; release.yml elevates separately on tag pushes.
permissions:
  contents: read

# Cancel an in-flight run when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate (${{ matrix.os }} · node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Show every failing cell — don't mask one OS behind another.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install (deterministic)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  install-smoke:
    name: install smoke (pack → fresh project)
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install + build
        run: |
          npm ci
          npm run build

      - name: Pack
        run: npm pack --pack-destination "$RUNNER_TEMP"

      - name: Install into a fresh project
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/consumer"
          cd "$RUNNER_TEMP/consumer"
          npm init -y >/dev/null
          npm install "$RUNNER_TEMP"/kairo-mcp-*.tgz

      - name: Smoke — dist files present
        run: |
          set -e
          cd "$RUNNER_TEMP/consumer"
          test -f node_modules/kairo-mcp/dist/index.js
          test -f node_modules/kairo-mcp/dist/cli/cli.js

      - name: Smoke — kairo --version exits 0
        run: |
          set -e
          cd "$RUNNER_TEMP/consumer"
          ./node_modules/.bin/kairo --version

      - name: Smoke — kairo doctor --json is valid JSON with stable shape
        run: |
          set -e
          cd "$RUNNER_TEMP/consumer"
          ./node_modules/.bin/kairo doctor --json -C . > doctor.json || true
          node -e "
            const j = require('$RUNNER_TEMP/consumer/doctor.json');
            if (typeof j.ok !== 'boolean' || !Array.isArray(j.checks)) {
              console.error('doctor JSON shape regressed:', JSON.stringify(j).slice(0, 200));
              process.exit(1);
            }
            console.log('doctor JSON shape: ok=' + j.ok + ', checks=' + j.checks.length);
          "
